<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bookmark Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; background: #f9fafb; }
    .container { max-width: 480px; margin: 40px auto; background: white; border-radius: 10px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    h1 { font-size: 20px; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 12px; font-size: 13px; color: #16a34a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bookmark Settings</h1>
    <div class="field">
      <label>Server URL</label>
      <input type="text" id="serverUrl" placeholder="http://localhost:3136">
      <p class="hint">Base URL of your bookmark server.</p>
    </div>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="Leave empty if not required">
      <p class="hint">Must match API_KEY on the server. Leave blank if not set.</p>
    </div>
    <button id="save">Save</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
